<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карпати 360</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #panorama { width: 100%; height: 100vh; background: #000; }
    </style>
</head>
<body>

<div id="panorama"></div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const sceneId = urlParams.get('scene') || 'goverla';

    const viewer = pannellum.viewer('panorama', {
        "default": {
            "firstScene": sceneId,
            "autoLoad": true,
            "sceneFadeDuration": 1000,
            "gyroscope": true,
            "orientationOnDeviceHelp": true
        },
        "scenes": {
            "goverla": {
                "title": "Гора Говерла",
                "type": "equirectangular",
                "panorama": "panoramas/goverla.jpg",
                "hotSpots": [
                    {
                        "pitch": -15,
                        "yaw": 170,
                        "type": "scene",
                        "text": "Спуститися до Заросляка",
                        "sceneId": "zar"
                    }
                ]
            },
            "zar": {
                "title": "База Заросляк",
                "type": "equirectangular",
                "panorama": "panoramas/zar.jpg",
                "hotSpots": [
                    {
                        "pitch": 20,
                        "yaw": 0,
                        "type": "scene",
                        "text": "Вид на Говерлу",
                        "sceneId": "goverla"
                    }
                ]
            }
        }
    });
</script>
</body>
</html>
