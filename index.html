<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карпати 360</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #panorama { width: 100%; height: 100vh; }
        
        /* Стиль для меню вибору */
        #controls {
            position: absolute; 
            bottom: 25px; 
            left: 15px; 
            z-index: 1000;
            background: rgba(0, 0, 0, 0.6); 
            padding: 8px; 
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        select { 
            background: #222; 
            color: white; 
            border: none; 
            padding: 6px 10px; 
            cursor: pointer; 
            border-radius: 4px;
            font-family: sans-serif;
            font-size: 14px;
            outline: none;
        }
        /* Ховаємо стандартні написи Pannellum, що накладаються */
        .pnlm-panorama-info { display: none !important; }
    </style>
</head>
<body>

<div id="controls">
    <select id="sceneList"></select>
</div>

<div id="panorama"></div>

<script>
    fetch('scenes.json')
        .then(response => response.json())
        .then(data => {
            const urlParams = new URLSearchParams(window.location.search);
            const startScene = urlParams.get('scene') || data.default.firstScene;

            window.viewer = pannellum.viewer('panorama', {
                "default": data.default,
                "scenes": data.scenes,
                "showSceneCaption": false // Вимикає автоматичну назву сцени
            });

            viewer.loadScene(startScene);

            const select = document.getElementById('sceneList');
            Object.keys(data.scenes).forEach(id => {
                const option = document.createElement('option');
                option.value = id;
                option.text = data.scenes[id].title; // Бере назву з JSON для списку
                if (id === startScene) option.selected = true;
                select.appendChild(option);
            });

            viewer.on('scenechange', (id) => { select.value = id; });
            select.addEventListener('change', (e) => { viewer.loadScene(e.target.value); });
        })
        .catch(err => console.error("Помилка JSON:", err));
</script>
</body>
</html>
