<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карпати 360</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #panorama { width: 100%; height: 100vh; }
        
        /* Стиль для меню вибору вершин */
        #controls {
            position: absolute; bottom: 20px; left: 20px; z-index: 100;
            background: rgba(0, 0, 0, 0.7); padding: 10px; border-radius: 5px;
        }
        select { background: #333; color: white; border: 1px solid #555; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="controls">
    <select id="sceneList" onchange="viewer.loadScene(this.value);">
        <option value="goverla">Гора Говерла</option>
        <option value="zar">База Заросляк</option>
        </select>
</div>

<div id="panorama"></div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const sceneId = urlParams.get('scene') || 'goverla';

    const viewer = pannellum.viewer('panorama', {
        "default": {
            "firstScene": sceneId,
            "autoLoad": true,
            "hfov": 110,           // Максимально широкий кут (стандартно 100)
            "compass": false,      // ПРИБИРАЄМО КОМПАС
            "gyroscope": true,
            "sceneFadeDuration": 1000,
            "crossOrigin": "anonymous"
        },
        "scenes": {
            "goverla": {
                "title": "Гора Говерла",
                "type": "equirectangular",
                "panorama": "panoramas/goverla.jpg",
                "hotSpots": [
                    { "pitch": -15, "yaw": 170, "type": "scene", "text": "До Заросляка", "sceneId": "zar" }
                ]
            },
            "zar": {
                "title": "База Заросляк",
                "type": "equirectangular",
                "panorama": "panoramas/zar.jpg",
                "hotSpots": [
                    { "pitch": 20, "yaw": 0, "type": "scene", "text": "На Говерлу", "sceneId": "goverla" }
                ]
            }
        }
    });

    // Оновлюємо вибір у меню при переході через стрілки
    viewer.on('scenechange', function(id) {
        document.getElementById('sceneList').value = id;
    });
</script>
</body>
</html>
