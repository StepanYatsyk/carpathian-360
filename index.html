<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Карпати 360 | Віртуальний тур Чорногірським хребтом</title>
    <meta name="description" content="Інтерактивний 360-тур вершинами Карпат: Говерла, Петрос, Шпиці, Туркул, Данціж та озеро Несамовите. Автор проекту: Степан Яцик.">
    <meta name="keywords" content="Карпати 360, панорами Карпат, Говерла, Петрос, Шпиці, Несамовите, Степан Яцик, віртуальний тур, гори України">
    
    <meta property="og:title" content="Карпати 360 — Віртуальна подорож">
    <meta property="og:description" content="Подивіться на Карпати з висоти пташиного польоту в інтерактивному турі.">
    <meta property="og:image" content="https://stepanyatsyk.github.io/carpathian-360/panoramas/goverla.jpg">
    <meta property="og:url" content="https://stepanyatsyk.github.io/carpathian-360/">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #panorama { width: 100%; height: 100vh; }
        
        /* Стиль для меню вибору */
        #controls {
            position: absolute; 
            bottom: 25px; 
            left: 15px; 
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7); 
            padding: 8px; 
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        select { 
            background: #222; 
            color: white; 
            border: 1px solid #444; 
            padding: 8px 12px; 
            cursor: pointer; 
            border-radius: 4px;
            font-family: sans-serif;
            font-size: 14px;
            outline: none;
        }

        /* НОВІ СТРІЛКИ: ВКАЗІВНИКИ ВНИЗ */
        .pnlm-scene-indicator {
            background-image: url('https://img.icons8.com/ios-filled/50/ffffff/chevron-down.png') !important;
            background-size: 70% !important;
            background-repeat: no-repeat !important;
            background-position: center !important;
            background-color: rgba(0, 0, 0, 0.5) !important;
            border: 2px solid #ffffff !important;
            border-radius: 50% !important;
            width: 40px !important;
            height: 40px !important;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .pnlm-scene-indicator:hover {
            background-color: rgba(255, 165, 0, 0.9) !important; /* Помаранчевий при наведенні */
            transform: scale(1.2) translateY(3px); /* Трохи опускається при наведенні */
        }

        /* Ховаємо стандартні написи Pannellum */
        .pnlm-panorama-info { display: none !important; }
        .pnlm-load-box { background: rgba(0,0,0,0.7) !important; border-radius: 10px; }
    </style>
</head>
<body>

<div id="controls">
    <select id="sceneList"></select>
</div>

<div id="panorama"></div>

<script>
    fetch('scenes.json')
        .then(response => response.json())
        .then(data => {
            const urlParams = new URLSearchParams(window.location.search);
            const startScene = urlParams.get('scene') || data.default.firstScene;

            window.viewer = pannellum.viewer('panorama', {
                "default": data.default,
                "scenes": data.scenes,
                "autoLoad": true,
                "showSceneCaption": false
            });

            // Завантаження початкової сцени
            viewer.loadScene(startScene);

            // Наповнення випадаючого списку
            const select = document.getElementById('sceneList');
            Object.keys(data.scenes).forEach(id => {
                const option = document.createElement('option');
                option.value = id;
                option.text = data.scenes[id].title;
                if (id === startScene) option.selected = true;
                select.appendChild(option);
            });

            // Оновлення списку при зміні сцени через стрілки
            viewer.on('scenechange', (id) => { 
                select.value = id; 
                // Оновлюємо URL без перезавантаження сторінки
                const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?scene=' + id;
                window.history.pushState({path:newurl},'',newurl);
            });

            // Зміна сцени через список
            select.addEventListener('change', (e) => { 
                viewer.loadScene(e.target.value); 
            });
        })
        .catch(err => {
            console.error("Помилка завантаження турів:", err);
            alert("Помилка завантаження файлу scenes.json. Перевірте його наявність.");
        });
</script>
</body>
</html>
