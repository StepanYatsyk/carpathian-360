<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карпати 360</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #panorama { width: 100%; height: 100vh; }
        #controls {
            position: absolute; bottom: 20px; left: 20px; z-index: 100;
            background: rgba(0, 0, 0, 0.7); padding: 10px; border-radius: 5px;
        }
        select { background: #333; color: white; border: 1px solid #555; padding: 5px; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

<div id="controls">
    <select id="sceneList"></select>
</div>

<div id="panorama"></div>

<script>
    // 1. Завантажуємо наш JSON файл
    fetch('scenes.json')
        .then(response => response.json())
        .then(data => {
            const urlParams = new URLSearchParams(window.location.search);
            const startScene = urlParams.get('scene') || data.default.firstScene;

            // 2. Ініціалізація Pannellum з даними з JSON
            window.viewer = pannellum.viewer('panorama', {
                "default": data.default,
                "scenes": data.scenes
            });

            // Встановлюємо початкову сцену
            viewer.loadScene(startScene);

            // 3. Автоматично наповнюємо меню вибору гір
            const select = document.getElementById('sceneList');
            Object.keys(data.scenes).forEach(id => {
                const option = document.createElement('option');
                option.value = id;
                option.text = data.scenes[id].title;
                if (id === startScene) option.selected = true;
                select.appendChild(option);
            });

            // Оновлюємо меню, якщо перейшли по стрілці
            viewer.on('scenechange', (id) => { select.value = id; });
            select.addEventListener('change', (e) => { viewer.loadScene(e.target.value); });
        })
        .catch(err => console.error("Помилка завантаження JSON:", err));
</script>
</body>
</html>
